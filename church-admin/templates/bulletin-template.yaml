# bulletin-template.yaml
# Template definition for weekly church bulletin (주보)
# Generated by template-scanner agent from document sample analysis
# Frequency: Weekly (52x/year) — highest scan-and-replicate ROI
#
# Template YAML Schema:
#   template_id   — unique identifier for this template version
#   document_type — category of church document
#   version       — semantic version for template evolution
#   paper         — physical layout constraints (size, orientation)
#   layout        — margins, columns, section flow
#   sections[]    — ordered list of document sections, each containing:
#     name        — machine-readable section identifier
#     title       — display title (Korean)
#     slots[]     — data-driven variable fields within this section
#       name      — slot identifier
#       type      — one of: text, date, integer, list, table, reference, currency
#       source    — dot-path into a data YAML file (e.g., "bulletin.sermon.title")
#       source_file — which YAML data file to read from
#       required  — whether this slot must be non-empty
#       format    — optional display format string
#       nullable  — whether null/missing values are acceptable

template_id: "bulletin-v1"
document_type: "bulletin"
version: "1.0"
description: "Weekly church bulletin (주보) — information hub for the congregation"

paper:
  size: "A4"
  orientation: "portrait"
  pages: 2

layout:
  margins:
    top_mm: 15
    bottom_mm: 15
    left_mm: 15
    right_mm: 15
  columns: 1
  section_divider: "---"

sections:
  # ── Header Section ──────────────────────────────────────────
  - name: "header"
    title: "교회 정보"
    description: "Church identity block — name, date, issue number"
    slots:
      - name: "church_name"
        type: "text"
        source: "bulletin.church_name"
        source_file: "bulletin-data.yaml"
        required: true
        description: "Full official church name"

      - name: "bulletin_date"
        type: "date"
        source: "bulletin.date"
        source_file: "bulletin-data.yaml"
        required: true
        format: "{year}년 {month}월 {day}일 주일"
        description: "Bulletin date — must be a Sunday"

      - name: "issue_number"
        type: "integer"
        source: "bulletin.issue_number"
        source_file: "bulletin-data.yaml"
        required: true
        format: "제 {value}호"
        description: "Sequential issue number"

  # ── Sermon Information ──────────────────────────────────────
  - name: "sermon"
    title: "말씀 (The Word)"
    description: "Sermon details — title, scripture, preacher, series"
    slots:
      - name: "sermon_series"
        type: "text"
        source: "bulletin.sermon.series"
        source_file: "bulletin-data.yaml"
        required: false
        nullable: true
        format: "[ {value} ]"
        description: "Sermon series name, if applicable"

      - name: "sermon_series_episode"
        type: "integer"
        source: "bulletin.sermon.series_episode"
        source_file: "bulletin-data.yaml"
        required: false
        nullable: true
        format: "제 {value}편"
        description: "Episode number within the series"

      - name: "sermon_title"
        type: "text"
        source: "bulletin.sermon.title"
        source_file: "bulletin-data.yaml"
        required: true
        description: "This week's sermon title"

      - name: "scripture"
        type: "text"
        source: "bulletin.sermon.scripture"
        source_file: "bulletin-data.yaml"
        required: true
        description: "Scripture reference (e.g., 요한복음 6:16-21)"

      - name: "preacher"
        type: "text"
        source: "bulletin.sermon.preacher"
        source_file: "bulletin-data.yaml"
        required: true
        description: "Preacher name and title"

  # ── Worship Order ───────────────────────────────────────────
  - name: "worship_order"
    title: "예배 순서 (Order of Worship)"
    description: "Numbered list of worship service elements"
    slots:
      - name: "worship_items"
        type: "table"
        source: "bulletin.worship_order"
        source_file: "bulletin-data.yaml"
        required: true
        columns:
          - name: "order"
            header: "순서"
            type: "integer"
          - name: "item"
            header: "항목"
            type: "text"
          - name: "detail"
            header: "내용"
            type: "text"
            nullable: true
          - name: "performer"
            header: "담당"
            type: "text"
            nullable: true
        description: "Ordered worship items with detail and responsible person"

  # ── Announcements ───────────────────────────────────────────
  - name: "announcements"
    title: "공지사항 (Announcements)"
    description: "Weekly announcements for the congregation"
    slots:
      - name: "announcement_items"
        type: "list"
        source: "bulletin.announcements"
        source_file: "bulletin-data.yaml"
        required: false
        item_format: "**{title}**: {content}"
        list_style: "bullet"
        description: "List of announcements — each with title and content"

  # ── Prayer Requests ─────────────────────────────────────────
  - name: "prayer_requests"
    title: "기도 제목 (Prayer Requests)"
    description: "Categories of prayer topics for the week"
    slots:
      - name: "prayer_items"
        type: "list"
        source: "bulletin.prayer_requests"
        source_file: "bulletin-data.yaml"
        required: false
        item_format: "[{category}] {content}"
        list_style: "bullet"
        description: "Prayer requests grouped by category"

  # ── Celebrations ────────────────────────────────────────────
  - name: "celebrations"
    title: "축하 (Celebrations)"
    description: "Birthday and wedding anniversary members this week"
    slots:
      - name: "birthdays"
        type: "list"
        source: "bulletin.celebrations.birthday"
        source_file: "bulletin-data.yaml"
        required: false
        nullable: true
        item_format: "{name} ({date})"
        list_style: "bullet"
        description: "Members with birthdays this week"
        reference_type: "member_id"
        reference_file: "members.yaml"

      - name: "wedding_anniversaries"
        type: "list"
        source: "bulletin.celebrations.wedding_anniversary"
        source_file: "bulletin-data.yaml"
        required: false
        nullable: true
        item_format: "가정 ({date})"
        list_style: "bullet"
        description: "Couples with wedding anniversaries this week"
        reference_type: "family_id"
        reference_file: "members.yaml"

  # ── Offering Team ───────────────────────────────────────────
  - name: "offering_team"
    title: "헌금 봉사 (Offering Team)"
    description: "Deacons and volunteers serving at the offering"
    slots:
      - name: "offering_volunteers"
        type: "list"
        source: "bulletin.offering_team"
        source_file: "bulletin-data.yaml"
        required: false
        list_style: "comma"
        description: "Names of this week's offering team"

  # ── Next Week Preview ───────────────────────────────────────
  - name: "next_week"
    title: "다음 주 예고 (Next Week Preview)"
    description: "Preview of next Sunday's sermon and events"
    slots:
      - name: "next_sermon_title"
        type: "text"
        source: "bulletin.next_week.sermon_title"
        source_file: "bulletin-data.yaml"
        required: false
        nullable: true
        description: "Next week's sermon title"

      - name: "next_scripture"
        type: "text"
        source: "bulletin.next_week.scripture"
        source_file: "bulletin-data.yaml"
        required: false
        nullable: true
        description: "Next week's scripture reference"

      - name: "next_special_events"
        type: "list"
        source: "bulletin.next_week.special_events"
        source_file: "bulletin-data.yaml"
        required: false
        nullable: true
        list_style: "bullet"
        description: "Special events happening next week"

output:
  format: "markdown"
  path_template: "bulletins/{date}-bulletin.md"
