# worship-template.yaml
# Template definition for worship order sheet (예배 순서지)
# Generated by template-scanner agent from document sample analysis
# Frequency: Weekly (every Sunday, sometimes midweek services)
#
# The worship order is focused on a single service — unlike the bulletin which
# covers a full week of information. Layout is a simple ordered list or
# two-column table (left: items, right: detail/responsible person).

template_id: "worship-order-v1"
document_type: "worship_order"
version: "1.0"
description: "Worship order sheet (예배 순서지) — single-service program"

paper:
  size: "A4"
  orientation: "portrait"
  pages: 1
  notes: "Can also be printed as half-A4 (A5) booklet style"

layout:
  margins:
    top_mm: 10
    bottom_mm: 10
    left_mm: 15
    right_mm: 15
  columns: 1
  section_divider: "---"

sections:
  # ── Header ──────────────────────────────────────────────────
  - name: "header"
    title: "예배 안내"
    description: "Church name, service identification, and date"
    slots:
      - name: "church_name"
        type: "text"
        source: "bulletin.church_name"
        source_file: "bulletin-data.yaml"
        required: true
        description: "Full official church name"

      - name: "service_date"
        type: "date"
        source: "bulletin.date"
        source_file: "bulletin-data.yaml"
        required: true
        format: "{year}년 {month}월 {day}일 (주일)"
        description: "Service date — typically a Sunday"

      - name: "service_name"
        type: "text"
        source: null
        required: false
        nullable: true
        default: "주일예배"
        description: "Service type name (e.g., 주일 1부 예배, 수요예배)"

  # ── Sermon Information ──────────────────────────────────────
  - name: "sermon_info"
    title: "말씀"
    description: "Sermon title, scripture, and preacher"
    slots:
      - name: "sermon_title"
        type: "text"
        source: "bulletin.sermon.title"
        source_file: "bulletin-data.yaml"
        required: true
        description: "This service's sermon title"

      - name: "scripture"
        type: "text"
        source: "bulletin.sermon.scripture"
        source_file: "bulletin-data.yaml"
        required: true
        description: "Scripture passage reference"

      - name: "preacher"
        type: "text"
        source: "bulletin.sermon.preacher"
        source_file: "bulletin-data.yaml"
        required: true
        description: "Name and title of the preacher"

  # ── Worship Order Items ─────────────────────────────────────
  - name: "worship_order"
    title: "예배 순서 (Order of Worship)"
    description: "Numbered sequence of worship elements with responsible persons"
    slots:
      - name: "order_items"
        type: "table"
        source: "bulletin.worship_order"
        source_file: "bulletin-data.yaml"
        required: true
        columns:
          - name: "order"
            header: "순서"
            type: "integer"
          - name: "item"
            header: "항목"
            type: "text"
          - name: "detail"
            header: "내용"
            type: "text"
            nullable: true
          - name: "performer"
            header: "담당"
            type: "text"
            nullable: true
        description: "Full ordered list of worship service elements"

  # ── Offering ────────────────────────────────────────────────
  - name: "offering"
    title: "헌금 봉사 (Offering)"
    description: "Offering collection team for this service"
    slots:
      - name: "offering_team"
        type: "list"
        source: "bulletin.offering_team"
        source_file: "bulletin-data.yaml"
        required: false
        nullable: true
        list_style: "comma"
        description: "Names of deacons/volunteers serving at the offering"

  # ── Announcements (brief) ───────────────────────────────────
  - name: "announcements"
    title: "광고 (Announcements)"
    description: "Brief announcements — shorter than bulletin version"
    slots:
      - name: "announcement_items"
        type: "list"
        source: "bulletin.announcements"
        source_file: "bulletin-data.yaml"
        required: false
        nullable: true
        item_format: "{title}"
        list_style: "bullet"
        description: "Announcement titles only (details in the main bulletin)"

output:
  format: "markdown"
  path_template: "bulletins/{date}-worship-order.md"
