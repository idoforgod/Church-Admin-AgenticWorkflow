# receipt-template.yaml
# Template definition for donation receipt (기부금영수증)
# Generated by template-scanner agent from document sample analysis
# Frequency: Annual bulk (100-200 per year for a 250-member church)
#
# Legal basis: 소득세법 제34조, 같은 법 시행령 제80조 제1항 제5호
# Churches are obligated to issue official donation receipts upon member request.
# Members use these for year-end tax deductions.
#
# CRITICAL constraints:
#   - Seal zone (직인 위치) must remain free of variable content
#   - Amounts must appear in both numeric (₩1,234,000) and Korean numeral (금 일백이십삼만사천원정)
#   - Donor ID number must be privacy-masked (XXXXXX-X******)
#   - Two copies per receipt: donor copy + church archive copy

template_id: "receipt-v1"
document_type: "receipt"
version: "1.0"
description: "Donation receipt (기부금영수증) — legally required tax document"

paper:
  size: "A4"
  orientation: "portrait"
  pages: 1
  copies: 2  # donor copy + church archive copy

legal:
  basis: "소득세법 제34조, 같은 법 시행령 제80조 제1항 제5호"
  issuer_type: "종교단체"
  description: "Tax-deductible donation receipt per Korean tax law"

sections:
  # ── Document Header ─────────────────────────────────────────
  - name: "header"
    title: "기부금영수증"
    description: "Receipt title and official numbering"
    fixed_content:
      title: "기 부 금 영 수 증"
      type_label: "종교단체"
    slots:
      - name: "receipt_number"
        type: "text"
        source: null
        required: true
        format: "No. {year}-{seq:03d}"
        derived: true
        derivation_rule: "year from finance.yaml.year + sequential counter"
        description: "Unique receipt number — sequential within fiscal year"

      - name: "issue_date"
        type: "date"
        source: null
        required: true
        format: "{year}년 {month}월 {day}일"
        derived: true
        derivation_rule: "generation_date"
        description: "Date of receipt generation"

  # ── Issuing Organization (Church) ───────────────────────────
  - name: "church_info"
    title: "발행 기관 정보"
    description: "Church details as the issuing organization"
    fixed_content:
      seal_zone: "RESERVED — 직인 위치 (NO_VARIABLE_CONTENT)"
    slots:
      - name: "church_name"
        type: "text"
        source: "church_name"
        source_file: "state.yaml"
        required: true
        description: "Full official church name"

      - name: "church_registration_number"
        type: "text"
        source: null
        required: true
        description: "Government registration number (고유번호증 번호)"
        note: "Provided via church-state config, not in seed data"

      - name: "church_address"
        type: "text"
        source: null
        required: true
        description: "Church full mailing address"

      - name: "representative_name"
        type: "text"
        source: null
        required: true
        description: "Senior pastor's name as legal representative"

  # ── Donor Information ───────────────────────────────────────
  - name: "donor_info"
    title: "기부자 정보"
    description: "Donor personal information — privacy-masked where required"
    slots:
      - name: "donor_name"
        type: "text"
        source: "members[id={member_id}].name"
        source_file: "members.yaml"
        required: true
        reference_type: "member_id"
        description: "Donor's full Korean name"

      - name: "donor_id_number"
        type: "text"
        source: "members[id={member_id}].resident_number"
        source_file: "members.yaml"
        required: false
        nullable: true
        masking: "XXXXXX-X******"
        description: "Resident registration number — last 6 digits masked for privacy"

      - name: "donor_address"
        type: "text"
        source: "members[id={member_id}].contact.address"
        source_file: "members.yaml"
        required: false
        nullable: true
        description: "Donor's home address"

  # ── Donation Details ────────────────────────────────────────
  - name: "donation_details"
    title: "기부 내역"
    description: "Donation period, amounts, and categories"
    slots:
      - name: "donation_period"
        type: "date"
        source: "year"
        source_file: "finance.yaml"
        required: true
        format: "{year}년 1월 1일 ~ {year}년 12월 31일"
        description: "Fiscal year period for this receipt"

      - name: "donation_items"
        type: "table"
        source: "offerings"
        source_file: "finance.yaml"
        required: true
        filter: "member_id == {member_id} and void == false"
        aggregate: "group_by_category_sum"
        columns:
          - name: "category"
            header: "헌금 구분"
            type: "text"
          - name: "amount"
            header: "금액 (원)"
            type: "currency"
            format: "{value:,}"
        description: "Itemized donation amounts by offering category"

      - name: "total_amount_numeric"
        type: "currency"
        source: "offerings"
        source_file: "finance.yaml"
        required: true
        filter: "member_id == {member_id} and void == false"
        aggregate: "sum"
        format: "₩{value:,}"
        description: "Total donation amount in numeric form"

      - name: "total_amount_korean"
        type: "text"
        source: null
        required: true
        derived: true
        derivation_rule: "integer_to_korean_numeral(total_amount_numeric)"
        format: "금 {value}원정"
        description: "Total amount in Korean numeral notation (법정 기재 방식)"

  # ── Legal Footer ────────────────────────────────────────────
  - name: "legal_footer"
    title: "법적 문구"
    description: "Legally required text and signature block"
    fixed_content:
      legal_text: "위 금액을 소득세법 제34조, 같은 법 시행령 제80조 제1항 제5호에 의하여 기부금으로 영수합니다."
    slots:
      - name: "confirmation_signature"
        type: "text"
        source: null
        required: true
        derived: true
        derivation_rule: "church_name + representative_name"
        format: "{church_name} 대표 {representative_name} (인)"
        description: "Representative signature line with seal mark"

output:
  format: "markdown"
  path_template: "certificates/receipts/{year}/{member_id}-receipt-{year}.md"
  bulk_generation: true
  batch_input:
    source_file: "members.yaml"
    filter: "status == 'active'"
    loop_field: "member_id"
